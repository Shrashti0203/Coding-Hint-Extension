<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hints</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <h3 style="margin: 0 0 8px 0;">AI Hint Assistant</h3>
    <div id="hint-container">
        <p id="hint-text">Click "Get Hint" to start.</p>
    </div>
    <div id="buttons">
        <button id="get-hint">Get Hint</button>
        <button id="next-hint">Next Hint</button>
        <button id="prev-hint">Previous Hint</button>
        <button id="alt-hint">Alternative Hint</button>
        <button id="reset-hints">Reset</button>
        <button id="full-explanation">Full Explanation</button>
    </div>
    <script src="hash_util.js"></script>
    <script src="popup.js"></script>
</body>
</html>
